spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

batch:
  worker-pool-size: 3
  max-retries: 3
  initial-backoff-ms: 1
  max-backoff-ms: 10
  mock-api-url: http://localhost:8080/mock/infer
  results-dir: target/test-results
